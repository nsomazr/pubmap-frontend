# gre.nileagi.com — React SPA (choose ONE approach)

# ── Option A (recommended): Nginx serves dist/ directly (no PM2 needed for static files)
# Replace /home/gre-user/htdocs/gre.nileagi.com/pubmap-frontend/dist with your real path.

server {
    listen 80;
    listen [::]:80;
    server_name gre.nileagi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gre.nileagi.com;

    # ssl_certificate /etc/letsencrypt/live/gre.nileagi.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gre.nileagi.com/privkey.pem;

    root /home/gre-user/htdocs/gre.nileagi.com/pubmap-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8099/api/;
        proxy_set_header Host api.gre.nileagi.com;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8099/media/;
        proxy_set_header Host api.gre.nileagi.com;
    }
}

