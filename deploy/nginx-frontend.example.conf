# Example Nginx site for gre.nileagi.com → PM2 serve on 127.0.0.1:3099
# Place in /etc/nginx/sites-available/gre-frontend and symlink to sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name gre.nileagi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gre.nileagi.com;

    # ssl_certificate /etc/letsencrypt/live/gre.nileagi.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gre.nileagi.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
