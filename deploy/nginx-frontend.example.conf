# globalresearchexchange.com — React SPA (choose ONE approach)

# IMPORTANT: The browser must reach Django at /api/… on the same site, OR via
# https://api.globalresearchexchange.com with CORS allowing globalresearchexchange.com AND www.globalresearchexchange.com.
# Build frontend with VITE_API_URL=/api when using the location /api/ block below.
# Replace /home/gre-user/htdocs/globalresearchexchange.com/pubmap-frontend/dist with your real path.

server {
    listen 80;
    listen [::]:80;
    server_name globalresearchexchange.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name globalresearchexchange.com;

    # ssl_certificate /etc/letsencrypt/live/globalresearchexchange.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/globalresearchexchange.com/privkey.pem;

    root /home/gre-user/htdocs/globalresearchexchange.com/pubmap-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8099/api/;
        proxy_set_header Host api.globalresearchexchange.com;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8099/media/;
        proxy_set_header Host api.globalresearchexchange.com;
    }
}

